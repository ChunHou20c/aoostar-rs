[dashboard]
width = 960
height = 376
stylesheet = "dashboard.css"
background = "#101318"
fonts = ["../../../fonts/DejaVuSans.ttf"]

[components.brand]
type = "column"
class = ["brand"]

[[components.brand.children]]
type = "text"
class = ["brand-title"]
text = "{{ @title }}"

[[components.brand.children]]
type = "text"
class = ["brand-subtitle"]
text = "{{ @subtitle }}"

[root]
type = "row"
id = "advanced-components"
class = ["dashboard"]

[[root.children]]
type = "component"
component = "brand"
params = { title = "AOOSTAR", subtitle = "Advanced widgets" }

[[root.children]]
type = "circular-progress"
class = ["indicator", "cpu"]
value = "{{ cpu_percent }}"
thickness = 8

[[root.children]]
type = "graph"
class = ["indicator", "history"]
value = "{{ cpu_history }}"
min = 0
max = 100
line-width = 3
fill = true

[[root.children]]
type = "gauge"
class = ["indicator", "temperature"]
value = "{{ cpu_temperature }}"
min = 20
max = 100
thickness = 7
needle-width = 3

[[root.children]]
type = "conditional"
class = ["warning"]
value = "{{ disk_state }}"
not-equals = "healthy"

[[root.children.children]]
type = "text"
text = "DISK"
