[dashboard]
width = 960
height = 376
stylesheet = "dashboard.css"
background = "#101318"
fonts = [
    "../../../fonts/DejaVuSans.ttf",
    "../../../fonts/HarmonyOS_Sans_SC_Bold.ttf",
]

[components.metric-card]
type = "column"
class = ["metric"]

[[components.metric-card.children]]
type = "text"
class = ["metric-label"]
text = "{{ @label }}"

[[components.metric-card.children]]
type = "text"
class = ["metric-value"]
text = "{{ @display-value }}"

[[components.metric-card.children]]
type = "progress"
class = ["metric-progress", "{{ @progress-class }}"]
value = "{{ @sensor-value }}"

[root]
type = "row"
id = "system-overview"
class = ["dashboard"]

[[root.children]]
type = "component"
component = "metric-card"
class = ["cpu"]

[root.children.params]
label = "CPU"
display-value = "{{ cpu_percent | number(0) }}%"
sensor-value = "{{ cpu_percent }}"
progress-class = "standard-progress"

[[root.children]]
type = "component"
component = "metric-card"
class = ["temperature"]

[root.children.params]
label = "TEMPERATURE"
display-value = "{{ cpu_temperature | number(0) }} C"
sensor-value = "{{ cpu_temperature }}"
progress-class = "temperature-progress"

[[root.children]]
type = "component"
component = "metric-card"
class = ["memory"]

[root.children.params]
label = "MEMORY"
display-value = "{{ memory_usage | number(0) }}%"
sensor-value = "{{ memory_usage }}"
progress-class = "standard-progress"
